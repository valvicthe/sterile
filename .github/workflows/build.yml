name: "release-build"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from the Actions UI

jobs:
  compile-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            artifact_path: "src-tauri/target/release/bundle/msi/*.msi"
            artifact_name: "sterile-audio-windows"
          - platform: "macos-latest"
            artifact_path: "src-tauri/target/release/bundle/dmg/*.dmg"
            artifact_name: "sterile-audio-mac"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: "checkout repository source"
        uses: actions/checkout@v4

      - name: "initialize node platform runtime"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "initialize rust compiler toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "cache rust compilation units"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: "provision node module dependencies"
        run: npm install

      - name: "execute production platform bundle"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "upload system artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
